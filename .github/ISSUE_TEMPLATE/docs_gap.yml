name: Docs gap
description: Report missing, stale, or misleading documentation.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: input
    id: repo
    attributes:
      label: Repository
      placeholder: dytallix-docs
    validations:
      required: true
  - type: textarea
    id: gap
    attributes:
      label: What is wrong or missing?
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: What should it say instead?
      description: Include the canonical command, endpoint, or behavior when known.